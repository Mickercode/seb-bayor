[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static page redirects — serve HTML from /pages/ with clean URLs
# These run BEFORE the Next.js serverless functions

# Homepage
[[redirects]]
  from = "/"
  to = "/pages/index.html"
  status = 200

# Corporate
[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200

