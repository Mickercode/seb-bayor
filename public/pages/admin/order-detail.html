<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/admin-shell.js"></script>
  <script>
    const orderId = window.location.pathname.split('/').filter(Boolean).pop();
    async function render() {
      document.getElementById('app').innerHTML = adminShell('/admin/orders', '<div class="py-6"><div class="text-center py-8"><span class="spinner mx-auto"></span></div></div>');
      try {
        const data = await API.get('/api/admin/orders/' + orderId);
        const o = data.order;
        const statuses = ['PENDING','RX_REVIEW','CONFIRMED','DISPATCHED','DELIVERED','CANCELLED'];
        const statusOpts = statuses.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s.replace('_',' ')}</option>`).join('');
        const items = (o.items||[]).map(i => {
          const snap = JSON.parse(i.snapshot||'{}');
          return `<div class="px-5 py-4 flex items-center justify-between"><div><p class="font-medium text-gray-900">${Utils.escapeHtml(i.product?.nameGeneric||snap.nameGeneric||'Unknown')}</p>${i.product?.nameBrand||snap.nameBrand?`<p class="text-sm text-gray-500">${Utils.escapeHtml(i.product?.nameBrand||snap.nameBrand)}</p>`:''}<p class="text-sm text-gray-400 mt-0.5">${Utils.formatPrice(i.unitPrice)} x ${i.quantity}</p></div><p class="font-semibold text-gray-900">${Utils.formatPrice(i.unitPrice*i.quantity)}</p></div>`;
        }).join('');

        const content = `
          <div class="py-6">
            <a href="/admin/orders" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-6"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>Back to Orders</a>
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
              <div><h1 class="text-2xl font-bold text-gray-900">Order ${Utils.shortId(o.id)}</h1><p class="text-sm text-gray-500 mt-1">${Utils.formatDateTime(o.createdAt)}</p></div>
              <div class="flex items-center gap-3">${Utils.statusBadge(o.status)}${Utils.statusBadge(o.paymentStatus)}</div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                  <div class="px-5 py-4 border-b border-gray-100 font-semibold text-gray-900">Order Items</div>
                  <div class="divide-y divide-gray-100">${items}</div>
                  <div class="px-5 py-4 bg-gray-50 space-y-2">
                    <div class="flex justify-between text-sm"><span class="text-gray-600">Subtotal</span><span>${Utils.formatPrice(o.subtotal)}</span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-600">Delivery</span><span>${Utils.formatPrice(o.deliveryFee)}</span></div>
                    <div class="flex justify-between font-bold text-base pt-2 border-t border-gray-200"><span>Total</span><span>${Utils.formatPrice(o.total)}</span></div>
                  </div>
                </div>
                ${o.notes?`<div class="bg-white rounded-xl border border-gray-200 p-5"><h2 class="font-semibold text-gray-900 mb-2">Customer Notes</h2><p class="text-sm text-gray-600">${Utils.escapeHtml(o.notes)}</p></div>`:''}
              </div>
              <div class="space-y-6">
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                  <h2 class="font-semibold text-gray-900 mb-4">Update Status</h2>
                  <select id="statusSelect" class="form-input mb-3">${statusOpts}</select>
                  <button id="updateBtn" onclick="updateStatus()" class="w-full px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg text-sm disabled:opacity-50">Update Status</button>
                </div>
                <div class="bg-white rounded-xl border border-gray-200 p-5">
                  <h2 class="font-semibold text-gray-900 mb-3">Customer</h2>
                  <p class="font-medium text-gray-900">${Utils.escapeHtml(o.user?.fullName||'')}</p>
                  <p class="text-sm text-gray-600">${Utils.escapeHtml(o.user?.email||'')}</p>
                  ${o.user?.phone?`<p class="text-sm text-gray-600">${Utils.escapeHtml(o.user.phone)}</p>`:''}
                </div>
                ${o.address?`<div class="bg-white rounded-xl border border-gray-200 p-5"><h2 class="font-semibold text-gray-900 mb-3">Delivery Address</h2><p class="font-medium text-gray-900">${Utils.escapeHtml(o.address.label)}</p><p class="text-sm text-gray-600">${Utils.escapeHtml(o.address.street)}</p><p class="text-sm text-gray-600">${Utils.escapeHtml(o.address.city)}, ${Utils.escapeHtml(o.address.state)}</p>${o.address.landmark?`<p class="text-sm text-gray-400">Near ${Utils.escapeHtml(o.address.landmark)}</p>`:''}</div>`:''}
              </div>
            </div>
          </div>`;
        document.getElementById('app').innerHTML = adminShell('/admin/orders', content);
      } catch { document.getElementById('app').innerHTML = adminShell('/admin/orders', '<p class="text-red-500 py-8">Failed to load order.</p>'); }
    }

    async function updateStatus() {
      const btn = document.getElementById('updateBtn');
      btn.disabled = true; btn.textContent = 'Updating...';
      try {
        await API.adminUpdateOrder(orderId, { status: document.getElementById('statusSelect').value });
        btn.textContent = 'Updated!';
        setTimeout(() => location.reload(), 500);
      } catch { btn.textContent = 'Failed'; btn.disabled = false; }
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
