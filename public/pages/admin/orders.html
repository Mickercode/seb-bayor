<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/admin-shell.js"></script>
  <script>
    const tabs = ['All','PENDING','CONFIRMED','DISPATCHED','DELIVERED'];
    let activeTab = Utils.getParam('status') || 'All';

    async function render() {
      const tabsHtml = tabs.map(t => `<a href="/admin/orders${t==='All'?'':'?status='+t}" class="px-4 py-2 text-sm font-medium rounded-lg whitespace-nowrap transition-colors ${activeTab===t?'bg-teal-700 text-white':'bg-white text-gray-600 hover:bg-gray-100 border border-gray-200'}">${t==='All'?'All Orders':t}</a>`).join('');
      document.getElementById('app').innerHTML = adminShell('/admin/orders', `<div class="py-6"><h1 class="text-2xl font-bold text-gray-900 mb-6">Order Management</h1><div class="flex gap-2 mb-6 overflow-x-auto pb-2">${tabsHtml}</div><div id="ordersList"><div class="text-center py-8"><span class="spinner mx-auto"></span></div></div></div>`);
      try {
        const status = activeTab === 'All' ? '' : activeTab;
        const data = await API.get('/api/admin/orders' + (status ? '?status='+status : ''));
        const orders = data.orders || [];
        const el = document.getElementById('ordersList');
        if (orders.length === 0) { el.innerHTML = '<div class="text-center py-16 bg-white rounded-xl border border-gray-200"><p class="text-gray-500">No orders found</p></div>'; return; }
        el.innerHTML = '<div class="bg-white rounded-xl border border-gray-200 divide-y divide-gray-200">' + orders.map(o => `
          <a href="/admin/orders/${o.id}" class="block p-4 hover:bg-gray-50 transition-colors">
            <div class="flex items-center justify-between">
              <div>
                <div class="flex items-center gap-2 mb-1"><p class="font-semibold text-gray-900">${Utils.shortId(o.id)}</p>${Utils.statusBadge(o.status)}</div>
                <p class="text-sm text-gray-600">${Utils.escapeHtml(o.user?.fullName||'')}</p>
                <p class="text-sm text-gray-400">${Utils.formatDate(o.createdAt)} &middot; ${o._count?.items||0} items</p>
              </div>
              <div class="text-right"><p class="font-bold text-gray-900">${Utils.formatPrice(o.total)}</p>${Utils.statusBadge(o.paymentStatus||'PENDING')}</div>
            </div>
          </a>`).join('') + '</div>';
      } catch { document.getElementById('ordersList').innerHTML = '<p class="text-red-500">Failed to load orders.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
