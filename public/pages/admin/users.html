<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/admin-shell.js"></script>
  <script>
    let showForm = false;

    async function render() {
      document.getElementById('app').innerHTML = adminShell('/admin/customers', `
        <div class="py-6">
          <div class="flex items-center justify-between mb-6">
            <div><h1 class="text-2xl font-bold text-gray-900">Staff Management</h1><p class="text-sm text-gray-500 mt-1">Create and manage admin & pharmacist accounts</p></div>
            <button onclick="toggleForm()" class="inline-flex items-center gap-2 px-4 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg text-sm">+ New Staff Account</button>
          </div>
          <div id="formArea" class="${showForm ? '' : 'hidden'} mb-8">
            <div class="bg-white rounded-xl border border-gray-200 p-6 max-w-xl">
              <h2 class="text-lg font-semibold text-gray-900 mb-4">Create Staff Account</h2>
              <div id="formError" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
              <div id="formSuccess" class="hidden mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-700"></div>
              <form id="userForm" class="space-y-4">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label><input id="fullName" required placeholder="Dr. Adebayo" class="form-input"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Email *</label><input id="email" type="email" required placeholder="staff@sebandbayor.com" class="form-input"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Phone</label><input id="phone" type="tel" placeholder="+234..." class="form-input"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Role *</label><select id="role" required class="form-input"><option value="PHARMACIST">Pharmacist</option><option value="ADMIN">Admin (Super)</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Password *</label><input id="password" type="password" required minlength="6" placeholder="Min 6 characters" class="form-input"></div>
                <div class="flex gap-3"><button type="submit" id="createBtn" class="px-6 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg text-sm disabled:opacity-50">Create Account</button><button type="button" onclick="toggleForm()" class="px-6 py-2.5 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm">Cancel</button></div>
              </form>
            </div>
          </div>
          <div id="usersList"><div class="text-center py-8"><span class="spinner mx-auto"></span></div></div>
        </div>`);

      loadUsers();
      setupForm();
    }

    async function loadUsers() {
      try {
        const data = await API.get('/api/admin/users');
        const users = data.users || [];
        const el = document.getElementById('usersList');
        if (users.length === 0) { el.innerHTML = '<div class="text-center py-16 bg-white rounded-xl border border-gray-200"><p class="text-gray-500">No staff accounts yet</p></div>'; return; }
        el.innerHTML = '<div class="bg-white rounded-xl border border-gray-200 divide-y divide-gray-200">' + users.map(u => `
          <div class="p-4 flex items-center justify-between">
            <div>
              <div class="flex items-center gap-2"><p class="font-medium text-gray-900">${Utils.escapeHtml(u.fullName)}</p><span class="badge ${u.role==='ADMIN'?'badge-red':'badge-teal'}">${u.role}</span></div>
              <p class="text-sm text-gray-500">${Utils.escapeHtml(u.email)}</p>
            </div>
            <p class="text-xs text-gray-400">${Utils.formatDate(u.createdAt)}</p>
          </div>`).join('') + '</div>';
      } catch { document.getElementById('usersList').innerHTML = '<p class="text-red-500 text-sm">Failed to load. Only ADMIN role can access this page.</p>'; }
    }

    function toggleForm() { showForm = !showForm; document.getElementById('formArea').classList.toggle('hidden'); }

    function setupForm() {
      document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('formError');
        const suc = document.getElementById('formSuccess');
        const btn = document.getElementById('createBtn');
        err.classList.add('hidden'); suc.classList.add('hidden');
        btn.disabled = true; btn.textContent = 'Creating...';
        try {
          await API.post('/api/admin/users', {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value || undefined,
            role: document.getElementById('role').value,
            password: document.getElementById('password').value,
          });
          suc.textContent = 'Staff account created!';
          suc.classList.remove('hidden');
          document.getElementById('userForm').reset();
          btn.disabled = false; btn.textContent = 'Create Account';
          loadUsers();
        } catch (ex) {
          err.textContent = ex.error || 'Failed to create account';
          err.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      });
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
