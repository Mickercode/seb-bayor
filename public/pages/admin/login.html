<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',300:'#7596A2',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-teal-900 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-800 mb-4">
        <svg class="w-8 h-8 text-teal-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Seb & Bayor Admin</h1>
      <p class="text-sm text-teal-300 mt-1">Staff portal — authorized access only</p>
    </div>
    <div class="bg-white rounded-xl shadow-2xl p-8">
      <div id="error" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
      <form id="form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Staff Email</label>
          <input id="email" type="email" required placeholder="admin@sebandbayor.com" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="password" type="password" required placeholder="Enter your password" class="form-input">
        </div>
        <button type="submit" id="btn" class="w-full flex items-center justify-center gap-2 rounded-lg bg-teal-700 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-800 disabled:opacity-50 transition-colors">Sign In</button>
      </form>
      <p class="mt-6 text-center text-xs text-gray-400">This portal is for Seb & Bayor staff only.</p>
    </div>
  </div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error'), btn = document.getElementById('btn');
      err.classList.add('hidden'); btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
      try {
        await API.adminLogin(document.getElementById('email').value, document.getElementById('password').value);
        window.location.href = '/admin';
      } catch (ex) { err.textContent = ex.error || 'Invalid credentials.'; err.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Sign In'; }
    });
  </script>
</body>
</html>
