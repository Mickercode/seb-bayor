<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Article | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div id="app"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/admin-shell.js"></script>
  <script>
    function render() {
      document.getElementById('app').innerHTML = adminShell('/admin', `
        <div class="py-6">
          <a href="/admin/articles" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-6">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>Back to Articles
          </a>
          <h1 class="text-2xl font-bold text-gray-900 mb-8">Write New Article</h1>
          <div id="error" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
          <form id="articleForm" class="bg-white rounded-xl border border-gray-200 p-6 space-y-6 max-w-3xl">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Title *</label><input id="title" required placeholder="Article title" class="form-input text-lg font-semibold"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div><label class="block text-sm font-medium text-gray-700 mb-1">Slug *</label><input id="slug" required placeholder="article-url-slug" class="form-input"><p class="text-xs text-gray-400 mt-1">Auto-generated from title</p></div>
              <div><label class="block text-sm font-medium text-gray-700 mb-1">Category</label><select id="category" class="form-input"><option>News</option><option>Health Tips</option><option>Drug Education</option><option>Disease Awareness</option><option>Public Health</option><option>Company Updates</option></select></div>
            </div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Excerpt</label><textarea id="excerpt" rows="2" placeholder="Short summary shown on the blog listing..." class="form-input"></textarea></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Content *</label><textarea id="content" required rows="15" placeholder="Write your article content here. HTML is supported." class="form-input font-mono text-sm"></textarea><p class="text-xs text-gray-400 mt-1">You can use basic HTML tags for formatting (p, h2, h3, ul, ol, li, strong, em, a)</p></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Cover Image URL</label><input id="coverImage" placeholder="https://..." class="form-input"></div>
            <div class="flex items-center gap-4">
              <label class="flex items-center gap-2 cursor-pointer"><input id="isPublished" type="checkbox" class="rounded"><span class="text-sm text-gray-700">Publish immediately</span></label>
            </div>
            <div class="flex gap-3 pt-4 border-t border-gray-200">
              <button type="submit" id="submitBtn" class="px-8 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg text-sm disabled:opacity-50">Create Article</button>
              <a href="/admin/articles" class="px-8 py-2.5 text-gray-600 bg-gray-100 hover:bg-gray-200 font-medium rounded-lg text-sm inline-flex items-center">Cancel</a>
            </div>
          </form>
        </div>`);

      // Auto-generate slug from title
      document.getElementById('title').addEventListener('input', (e) => {
        document.getElementById('slug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      });

      document.getElementById('articleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('error');
        const btn = document.getElementById('submitBtn');
        err.classList.add('hidden');
        btn.disabled = true; btn.textContent = 'Creating...';
        try {
          await API.post('/api/admin/articles', {
            title: document.getElementById('title').value,
            slug: document.getElementById('slug').value,
            excerpt: document.getElementById('excerpt').value || null,
            content: document.getElementById('content').value,
            coverImage: document.getElementById('coverImage').value || null,
            category: document.getElementById('category').value,
            isPublished: document.getElementById('isPublished').checked,
          });
          window.location.href = '/admin/articles';
        } catch (ex) {
          err.textContent = ex.error || 'Failed to create article';
          err.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Create Article';
        }
      });
    }

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
