<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',500:'#2F5D6C',600:'#264B57',700:'#1C3841'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="corporate" class="min-h-screen flex flex-col items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md">
    <div class="flex items-center justify-between mb-8">
      <a href="/"><span class="text-xl font-bold text-teal-700">Seb & Bayor</span></a>
      <a href="/auth/login" class="text-sm text-gray-500 hover:text-gray-700">Back to login</a>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <div id="formView">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-gray-900">Reset Password</h1>
          <p class="text-sm text-gray-500 mt-1">Enter your email and we'll send you a reset link</p>
        </div>
        <form id="form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="email" type="email" required placeholder="you@example.com" class="form-input">
          </div>
          <button type="submit" id="btn" class="w-full rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50">Send Reset Link</button>
        </form>
        <p class="mt-6 text-center text-sm text-gray-500">Remember your password? <a href="/auth/login" class="text-teal-600 font-medium hover:underline">Back to login</a></p>
      </div>
      <div id="successView" class="hidden text-center py-4">
        <svg class="w-12 h-12 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p class="text-sm text-gray-700">If an account exists with that email, you will receive a reset link.</p>
        <a href="/auth/login" class="inline-block mt-6 text-sm text-teal-600 font-medium hover:underline">Back to login</a>
      </div>
    </div>
  </div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try { await API.forgotPassword(document.getElementById('email').value); } catch {}
      document.getElementById('formView').classList.add('hidden');
      document.getElementById('successView').classList.remove('hidden');
    });
  </script>
</body>
</html>
