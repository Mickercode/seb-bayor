<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',500:'#2F5D6C',600:'#264B57',700:'#1C3841'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="corporate" class="min-h-screen flex flex-col items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <div id="invalidView" class="hidden text-center">
        <svg class="w-12 h-12 text-amber-500 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Invalid Reset Link</h1>
        <p class="text-sm text-gray-500 mb-6">This password reset link is invalid or has expired.</p>
        <a href="/auth/forgot-password" class="text-sm text-teal-600 font-medium hover:underline">Request a new reset link</a>
      </div>
      <div id="formView" class="hidden">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-gray-900">Set New Password</h1>
          <p class="text-sm text-gray-500 mt-1">Enter your new password below</p>
        </div>
        <div id="error" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
        <form id="form" class="space-y-4">
          <div><label class="block text-sm font-medium text-gray-700 mb-1">New Password</label><input id="password" type="password" required minlength="6" placeholder="At least 6 characters" class="form-input"></div>
          <div><label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label><input id="confirmPassword" type="password" required placeholder="Repeat password" class="form-input"></div>
          <button type="submit" id="btn" class="w-full rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50">Reset Password</button>
        </form>
      </div>
      <div id="successView" class="hidden text-center">
        <svg class="w-12 h-12 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Password Reset!</h1>
        <p class="text-sm text-gray-500 mb-6">Your password has been updated successfully.</p>
        <a href="/auth/login" class="inline-block rounded-lg bg-teal-600 px-6 py-2.5 text-sm font-semibold text-white hover:bg-teal-700">Log In</a>
      </div>
    </div>
  </div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { document.getElementById('invalidView').classList.remove('hidden'); }
    else { document.getElementById('formView').classList.remove('hidden'); }
    document.getElementById('form')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error'), btn = document.getElementById('btn');
      err.classList.add('hidden');
      const pw = document.getElementById('password').value;
      if (pw !== document.getElementById('confirmPassword').value) { err.textContent='Passwords do not match'; err.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Resetting...';
      try { await API.resetPassword(token, pw); document.getElementById('formView').classList.add('hidden'); document.getElementById('successView').classList.remove('hidden'); }
      catch (e) { err.textContent = e.error || 'Failed to reset password'; err.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Reset Password'; }
    });
  </script>
</body>
</html>
