<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9',600:'#0EBE87'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="corporate" class="min-h-screen flex flex-col items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md">
    <div class="flex items-center justify-between mb-8">
      <a href="/"><span class="text-xl font-bold text-teal-700">Seb & Bayor</span></a>
      <a href="/" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>Back to home
      </a>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Create Account</h1>
        <p class="text-sm text-gray-500 mt-1">Join Seb & Bayor</p>
      </div>
      <div id="error" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
      <form id="regForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name *</label>
          <input id="fullName" type="text" required placeholder="Adunni Okafor" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input id="email" type="email" required placeholder="you@example.com" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone (optional)</label>
          <input id="phone" type="tel" placeholder="+234 800 000 0000" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
          <input id="password" type="password" required minlength="6" placeholder="At least 6 characters" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password *</label>
          <input id="confirmPassword" type="password" required placeholder="Repeat password" class="form-input">
        </div>
        <button type="submit" id="submitBtn" class="w-full rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50 transition-colors">Create Account</button>
      </form>
      <p class="mt-6 text-center text-sm text-gray-500">Already have an account? <a href="/auth/login" class="text-teal-600 font-medium hover:underline">Sign In</a></p>
    </div>
  </div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      const btn = document.getElementById('submitBtn');
      err.classList.add('hidden');
      const pw = document.getElementById('password').value;
      if (pw !== document.getElementById('confirmPassword').value) { err.textContent='Passwords do not match'; err.classList.remove('hidden'); return; }
      if (pw.length < 6) { err.textContent='Password must be at least 6 characters'; err.classList.remove('hidden'); return; }
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        await API.register({ fullName: document.getElementById('fullName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value || undefined, password: pw });
        window.location.href = '/auth/login';
      } catch (e) { err.textContent = e.error || 'Registration failed'; err.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
