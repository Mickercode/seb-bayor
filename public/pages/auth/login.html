<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',100:'#D1E1E6',200:'#A3C3CD',300:'#7596A2',400:'#527A87',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',50:'#E6FDF6',100:'#CCFBED',200:'#99F7DB',300:'#66F3C9',400:'#33EFB7',500:'#12EDA9',600:'#0EBE87',700:'#0B8E65',800:'#075F44',900:'#042F22'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="corporate" class="min-h-screen flex flex-col items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-md">
    <div class="flex items-center justify-between mb-8">
      <a href="/"><img src="/seb-bayor-logo.png" alt="Seb & Bayor" class="h-10 w-auto" onerror="this.outerHTML='<span class=\'text-xl font-bold text-teal-700\'>Seb & Bayor</span>'"></a>
      <a href="/" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
        Back to home
      </a>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
      </div>
      <div id="error" class="hidden mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <input id="email" type="email" required placeholder="you@example.com" class="form-input form-input-icon">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input id="password" type="password" required placeholder="Enter your password" class="form-input form-input-icon">
          </div>
        </div>
        <button type="submit" id="submitBtn" class="w-full flex items-center justify-center gap-2 rounded-lg bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50 transition-colors">
          Sign In
        </button>
      </form>
      <div class="mt-4 text-center">
        <a href="/auth/forgot-password" class="text-sm text-teal-600 hover:underline">Forgot your password?</a>
      </div>
      <p class="mt-6 text-center text-sm text-gray-500">
        Don't have an account? <a href="/auth/register" class="text-teal-600 font-medium hover:underline">Register</a>
      </p>
    </div>
  </div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';
      try {
        await API.login(document.getElementById('email').value, document.getElementById('password').value);
        const from = Utils.getParam('from');
        window.location.href = from || '/shop';
      } catch (err) {
        errorEl.textContent = err.error || 'Invalid email or password.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
