<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Prescriptions | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50" data-zone="corporate">
  <div id="app"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    async function render() {
      let content = '<div class="py-6"><div class="flex items-center justify-between mb-6"><h1 class="text-2xl font-bold text-gray-900">My Prescriptions</h1><a href="/prescription/upload" class="inline-flex items-center gap-2 px-4 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg text-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Upload</a></div><div id="rxList"><div class="text-center py-8"><span class="spinner mx-auto"></span></div></div></div>';
      document.getElementById('app').innerHTML = Components.dashboardShell('/dashboard/prescriptions', content);
      try {
        const data = await API.getOrders();
        const rxList = [];
        (data.orders || []).forEach(o => { (o.prescriptions || []).forEach(rx => { rxList.push({ ...rx, orderId: o.id }); }); });
        const el = document.getElementById('rxList');
        if (rxList.length === 0) {
          el.innerHTML = '<div class="text-center py-16 bg-white rounded-xl border border-gray-200"><svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p class="text-gray-500 mb-4">No prescriptions uploaded yet</p><a href="/prescription/upload" class="inline-flex items-center gap-2 px-6 py-2.5 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg">Upload Prescription</a></div>';
          return;
        }
        el.innerHTML = '<div class="space-y-4">' + rxList.map(rx => `
          <div class="bg-white rounded-xl border border-gray-200 p-5">
            <div class="flex items-center gap-3 mb-2">${Utils.statusBadge(rx.status)}<span class="text-sm text-gray-500">Order ${Utils.shortId(rx.orderId)}</span></div>
            <p class="text-sm text-gray-500">Submitted: ${Utils.formatDateTime(rx.submittedAt)}</p>
            ${rx.patientName ? `<p class="text-sm text-gray-600 mt-1">Patient: ${Utils.escapeHtml(rx.patientName)}</p>` : ''}
            ${rx.reviewNote ? `<div class="mt-2 flex items-start gap-2 bg-amber-50 border border-amber-200 rounded-lg p-3"><svg class="w-4 h-4 text-amber-600 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><div><p class="text-xs font-medium text-amber-700 mb-0.5">Pharmacist Note</p><p class="text-sm text-amber-800">${Utils.escapeHtml(rx.reviewNote)}</p></div></div>` : ''}
          </div>`).join('') + '</div>';
      } catch { document.getElementById('rxList').innerHTML = '<p class="text-red-500 text-sm">Failed to load prescriptions.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
