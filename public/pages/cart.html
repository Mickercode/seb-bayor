<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | AnythingDrugs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',500:'#2F5D6C'},mint:{DEFAULT:'#12EDA9',50:'#E6FDF6',500:'#12EDA9',600:'#0EBE87'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="shop" class="bg-white">
  <div id="nav"></div>
  <section class="section-padding"><div class="container-max" id="cartContent"></div></section>
  <div id="footer"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.shopNav();
    document.getElementById('footer').innerHTML = Components.footer();

    function renderCart() {
      const items = Cart.getItems();
      if (items.length === 0) {
        document.getElementById('cartContent').innerHTML = '<div class="text-center py-20"><svg class="mx-auto w-16 h-16 text-gray-300 mb-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg><h1 class="text-2xl font-bold text-gray-900 mb-3">Your Cart</h1><p class="text-gray-500 mb-8">Your cart is empty</p><a href="/shop" class="inline-block rounded-lg bg-mint-500 px-8 py-3 font-semibold text-white hover:bg-mint-600">Browse Shop</a></div>';
        return;
      }
      const subtotal = Cart.getTotal();
      document.getElementById('cartContent').innerHTML = `
        <h1 class="text-2xl font-bold text-gray-900 mb-8">Your Cart</h1>
        <div class="lg:grid lg:grid-cols-12 lg:gap-8">
          <div class="lg:col-span-8 space-y-4">
            ${items.map(i => `
              <div class="flex items-start gap-4 rounded-lg border border-gray-200 bg-white p-4">
                <div class="h-20 w-20 flex-shrink-0 rounded-md bg-gray-200"></div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-start justify-between gap-2">
                    <div><h3 class="font-semibold text-gray-900">${Utils.escapeHtml(i.nameGeneric)}</h3>${i.nameBrand?`<p class="text-sm text-gray-500">${Utils.escapeHtml(i.nameBrand)}</p>`:''}</div>
                    <button onclick="Cart.remove('${i.productId}');renderCart()" class="shrink-0 rounded p-1 text-gray-400 hover:bg-red-50 hover:text-red-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                  </div>
                  <p class="mt-1 text-sm text-gray-600">${Utils.formatPrice(i.price)} each</p>
                  ${i.requiresPrescription?'<span class="mt-1 inline-block rounded-full bg-amber-100 px-2 py-0.5 text-xs font-medium text-amber-700">Rx Required</span>':''}
                  <div class="mt-3 flex items-center justify-between">
                    <div class="flex items-center rounded-lg border border-gray-200">
                      <button onclick="Cart.updateQty('${i.productId}',${i.quantity-1});renderCart()" ${i.quantity<=1?'disabled':''} class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-gray-700 disabled:opacity-40">−</button>
                      <span class="w-8 h-8 flex items-center justify-center text-sm font-medium">${i.quantity}</span>
                      <button onclick="Cart.updateQty('${i.productId}',${i.quantity+1});renderCart()" ${i.quantity>=10?'disabled':''} class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-gray-700 disabled:opacity-40">+</button>
                    </div>
                    <p class="font-semibold text-gray-900">${Utils.formatPrice(i.price*i.quantity)}</p>
                  </div>
                </div>
              </div>`).join('')}
            ${Cart.hasRx()?'<div class="mt-6 flex items-start gap-3 rounded-lg border border-amber-200 bg-amber-50 p-4"><svg class="w-5 h-5 shrink-0 text-amber-500 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg><p class="text-sm text-amber-800">One or more items require a valid prescription. You\'ll upload it during checkout.</p></div>':''}
          </div>
          <div class="mt-8 lg:col-span-4 lg:mt-0">
            <div class="rounded-lg border border-gray-200 bg-white p-6">
              <h2 class="text-lg font-bold text-gray-900 mb-4">Order Summary</h2>
              <div class="space-y-3 text-sm">
                <div class="flex justify-between"><span class="text-gray-600">Subtotal</span><span class="font-medium text-gray-900">${Utils.formatPrice(subtotal)}</span></div>
                <div class="flex justify-between"><span class="text-gray-600">Delivery fee</span><span class="text-gray-500">Calculated at checkout</span></div>
                <div class="border-t pt-3 flex justify-between"><span class="font-semibold text-gray-900">Total</span><span class="font-bold text-gray-900">${Utils.formatPrice(subtotal)}</span></div>
              </div>
              <a href="/checkout" class="mt-6 block w-full rounded-lg bg-mint-500 py-3 text-center font-semibold text-white hover:bg-mint-600">Proceed to Checkout</a>
              <a href="/shop" class="mt-3 block w-full text-center text-sm font-medium text-mint-600 hover:text-mint-700">Continue Shopping</a>
            </div>
          </div>
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', () => { Cart.onChange(renderCart); });
  </script>
</body>
</html>
