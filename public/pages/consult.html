<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Request Consultation | Seb & Bayor</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script><link rel="stylesheet" href="/css/styles.css"></head><body data-zone="shop" class="bg-white"><div id="nav"></div><section class="section-padding"><div class="container-max max-w-lg"><h1 class="text-2xl font-bold text-gray-900 mb-2">Request a Consultation</h1><p class="text-gray-500 mb-8">Speak with a pharmacist about your health concerns.</p><form id="consultForm" class="space-y-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number *</label><input id="whatsapp" type="tel" required placeholder="+234 800 000 0000" class="form-input"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Topic *</label><select id="topic" required class="form-input"><option value="">Select topic</option><option>Medication Inquiry</option><option>Minor Ailment</option><option>Chronic Disease Management</option><option>Drug Interaction Check</option><option>General Health Advice</option><option>Other</option></select></div><div><label class="block text-sm font-medium text-gray-700 mb-1">Additional Notes</label><textarea id="notes" rows="3" placeholder="Briefly describe your concern..." class="form-input"></textarea></div><button type="submit" id="submitBtn" class="btn-primary w-full py-3">Submit Request</button></form><div id="success" class="hidden text-center py-8"><svg class="w-12 h-12 text-green-500 mx-auto mb-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><p class="text-gray-700 font-semibold">Consultation request submitted!</p><p class="text-sm text-gray-500 mt-2">A pharmacist will contact you on WhatsApp shortly.</p></div></div></section><div id="footer"></div><script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script><script src="/js/api.js"></script><script src="/js/cart.js"></script><script src="/js/components.js"></script><script>document.getElementById('nav').innerHTML=Components.shopNav();document.getElementById('footer').innerHTML=Components.footer();document.getElementById('consultForm').addEventListener('submit',async(e)=>{e.preventDefault();const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Submitting...';try{await API.post('/api/consultations',{whatsappNumber:document.getElementById('whatsapp').value,topic:document.getElementById('topic').value});document.getElementById('consultForm').classList.add('hidden');document.getElementById('success').classList.remove('hidden');}catch{btn.disabled=false;btn.textContent='Submit Request';alert('Failed to submit. Please try again.');}});</script></body></html>
