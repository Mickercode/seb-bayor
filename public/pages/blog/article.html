<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Seb & Bayor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841',800:'#13262C',900:'#091316'},mint:{DEFAULT:'#12EDA9',500:'#12EDA9'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
  <style>.article-content h2{font-size:1.5rem;font-weight:700;margin:2rem 0 1rem;color:#111827}.article-content h3{font-size:1.25rem;font-weight:600;margin:1.5rem 0 0.75rem;color:#111827}.article-content p{margin-bottom:1rem;line-height:1.75;color:#4b5563}.article-content ul,.article-content ol{margin:1rem 0;padding-left:1.5rem;color:#4b5563}.article-content li{margin-bottom:0.5rem}.article-content a{color:#2F5D6C;text-decoration:underline}.article-content strong{font-weight:600;color:#111827}</style>
</head>
<body data-zone="corporate" class="bg-white text-gray-900">
  <div id="nav"></div>
  <div id="content"><div class="text-center py-20"><span class="spinner mx-auto"></span></div></div>
  <div id="footer"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.corporateNav('/blog');
    document.getElementById('footer').innerHTML = Components.footer();
    const slug = window.location.pathname.split('/').filter(Boolean).pop();

    async function load() {
      try {
        const data = await API.get('/api/articles/' + slug);
        const a = data.article;
        document.title = a.title + ' | Seb & Bayor';
        document.getElementById('content').innerHTML = `
          ${a.coverImage ? `<div class="w-full h-64 md:h-96 bg-gray-100"><img src="${Utils.escapeHtml(a.coverImage)}" alt="" class="w-full h-full object-cover"></div>` : ''}
          <article class="section-padding">
            <div class="container-max max-w-3xl">
              <a href="/blog" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-8">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>Back to Health Hub
              </a>
              <div class="flex items-center gap-3 mb-4">
                <span class="badge badge-teal">${Utils.escapeHtml(a.category)}</span>
                <span class="text-sm text-gray-400">${Utils.formatDate(a.publishedAt || a.createdAt)}</span>
              </div>
              <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4" style="font-family:var(--font-heading)">${Utils.escapeHtml(a.title)}</h1>
              <p class="text-sm text-gray-500 mb-8">By ${Utils.escapeHtml(a.author?.fullName || 'Seb & Bayor Pharmaceuticals')}</p>
              <div class="article-content">${a.content}</div>
              <div class="mt-12 pt-8 border-t border-gray-200">
                <p class="text-xs text-gray-400">This article is for informational purposes only and does not replace professional medical advice. Always consult your pharmacist or doctor.</p>
              </div>
            </div>
          </article>`;
      } catch {
        document.getElementById('content').innerHTML = '<div class="text-center py-20"><p class="text-gray-500">Article not found.</p><a href="/blog" class="text-teal-600 hover:underline mt-4 inline-block">Back to Health Hub</a></div>';
      }
    }

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
