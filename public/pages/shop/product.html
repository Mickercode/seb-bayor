<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | AnythingDrugs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',500:'#2F5D6C'},mint:{DEFAULT:'#12EDA9',50:'#E6FDF6',500:'#12EDA9',600:'#0EBE87'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="shop" class="bg-white">
  <div id="nav"></div>
  <div class="section-padding"><div class="container-max" id="content"><div class="text-center py-16"><span class="spinner mx-auto"></span></div></div></div>
  <div id="footer"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.shopNav();
    document.getElementById('footer').innerHTML = Components.footer();
    const slug = window.location.pathname.split('/').filter(Boolean).pop();
    let qty = 1;

    async function load() {
      try {
        const data = await API.getProduct(slug);
        const p = data.product, related = data.related || [];
        document.title = p.nameGeneric + ' | AnythingDrugs';

        const tabs = [
          {label:'Description',content:p.description},{label:'Indications',content:p.indications},
          {label:'Dosage',content:p.dosageGuidance},{label:'Warnings',content:p.warnings},{label:'Storage',content:p.storage}
        ].filter(t => t.content);

        document.getElementById('content').innerHTML = `
          <nav class="flex items-center gap-1.5 text-sm text-gray-500 mb-8 flex-wrap">
            <a href="/shop" class="hover:text-mint-600">Shop</a> &rsaquo;
            <a href="/shop/${p.category?.slug||''}" class="hover:text-mint-600">${Utils.escapeHtml(p.category?.name||'')}</a> &rsaquo;
            <span class="text-gray-900 font-medium">${Utils.escapeHtml(p.nameGeneric)}</span>
          </nav>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
            <div><div class="aspect-square bg-gray-100 rounded-lg flex items-center justify-center mb-4"><span class="text-gray-300">Product Image</span></div></div>
            <div>
              <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-1">${Utils.escapeHtml(p.nameGeneric)}</h1>
              ${p.nameBrand?`<p class="text-sm text-gray-400 mb-4">${Utils.escapeHtml(p.nameBrand)}</p>`:''}
              <p class="text-3xl font-bold text-gray-900 mb-4">${Utils.formatPrice(p.price)}</p>
              ${p.requiresPrescription?`<div class="flex items-start gap-2 bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4"><svg class="w-5 h-5 text-amber-600 shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg><p class="text-sm text-amber-800"><span class="font-semibold">Prescription Required</span> — Upload at checkout</p></div>`:''}
              ${p.nafdacNumber?`<p class="text-xs text-gray-400 mb-4">NAFDAC Reg. No: <span class="font-mono">${Utils.escapeHtml(p.nafdacNumber)}</span></p>`:''}
              <div class="mb-6">
                <label class="text-sm font-medium text-gray-700 mb-2 block">Quantity</label>
                <div class="inline-flex items-center border border-gray-300 rounded-lg">
                  <button onclick="changeQty(-1)" class="p-2.5 text-gray-500 hover:text-gray-700">−</button>
                  <span id="qtyDisplay" class="w-12 text-center text-sm font-semibold">${qty}</span>
                  <button onclick="changeQty(1)" class="p-2.5 text-gray-500 hover:text-gray-700">+</button>
                </div>
                ${p.stockQty<=5&&p.stockQty>0?`<p class="text-xs text-amber-600 mt-1">Only ${p.stockQty} left</p>`:''}
                ${p.stockQty===0?'<p class="text-xs text-red-600 mt-1">Out of stock</p>':''}
              </div>
              <button id="addBtn" onclick="addToCart()" ${p.stockQty===0?'disabled':''} class="w-full bg-mint-500 hover:bg-mint-600 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-3.5 px-6 rounded-lg text-base transition-colors mb-4">Add to Cart</button>
            </div>
          </div>
          <div class="mt-12 border-t border-gray-100 pt-8">
            <div class="flex gap-4 border-b border-gray-200 mb-6">${tabs.map((t,i)=>`<button onclick="showTab(${i})" class="tab-btn px-4 py-2 text-sm font-medium ${i===0?'text-mint-600 border-b-2 border-mint-500':'text-gray-500 hover:text-gray-700'}" data-tab="${i}">${t.label}</button>`).join('')}</div>
            <div id="tabContent" class="text-sm text-gray-700 leading-relaxed">${Utils.escapeHtml(tabs[0]?.content||'')}</div>
          </div>
          <div class="mt-8 bg-gray-50 rounded-lg p-4 text-xs text-gray-500"><p><strong>Medical Disclaimer:</strong> Product information is for informational purposes only and is not a substitute for professional medical advice.</p></div>
          ${related.length>0?`<div class="mt-12"><h2 class="text-xl font-bold text-gray-900 mb-6">Related Products</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${related.map(r=>`<a href="/shop/product/${r.slug}" class="border border-gray-200 rounded-lg overflow-hidden hover:shadow-md"><div class="aspect-square bg-gray-100 flex items-center justify-center"><span class="text-gray-300 text-xs">Image</span></div><div class="p-3"><h3 class="text-sm font-bold text-gray-900">${Utils.escapeHtml(r.nameGeneric)}</h3><p class="text-base font-bold text-gray-900 mt-2">${Utils.formatPrice(r.price)}</p></div></a>`).join('')}</div></div>`:''}`;

        window._product = p;
        window._tabs = tabs;
      } catch { document.getElementById('content').innerHTML = '<div class="text-center py-16"><p class="text-gray-500">Product not found.</p><a href="/shop" class="text-mint-600 hover:underline mt-4 inline-block">Back to shop</a></div>'; }
    }

    function changeQty(d) { qty = Math.max(1, Math.min(10, qty+d)); document.getElementById('qtyDisplay').textContent = qty; }

    function addToCart() {
      const p = window._product;
      Cart.add({productId:p.id,nameGeneric:p.nameGeneric,nameBrand:p.nameBrand||null,price:p.price,requiresPrescription:p.requiresPrescription,slug:p.slug}, qty);
      const btn = document.getElementById('addBtn');
      btn.textContent = 'Added!'; setTimeout(()=>btn.textContent='Add to Cart',2000);
    }

    function showTab(idx) {
      document.getElementById('tabContent').textContent = window._tabs[idx]?.content||'';
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.className = 'tab-btn px-4 py-2 text-sm font-medium ' + (i===idx?'text-mint-600 border-b-2 border-mint-500':'text-gray-500 hover:text-gray-700');
      });
    }

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
