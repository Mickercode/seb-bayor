<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | AnythingDrugs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{teal:{DEFAULT:'#2F5D6C',50:'#E8F0F3',500:'#2F5D6C',600:'#264B57',700:'#1C3841'},mint:{DEFAULT:'#12EDA9',50:'#E6FDF6',500:'#12EDA9',600:'#0EBE87'}}}}}</script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body data-zone="shop" class="bg-white text-gray-900">
  <div id="nav"></div>
  <section class="bg-gray-50 section-padding">
    <div class="container-max text-center">
      <h1 class="text-3xl md:text-5xl font-bold text-gray-900 leading-tight mb-4">Order Your Medications &amp; Health Products Online</h1>
      <p class="text-lg text-gray-600 mb-8 max-w-2xl mx-auto">Fast, reliable, pharmacist-verified — delivered to your door.</p>
      <form action="/shop/search" class="max-w-xl mx-auto mb-8">
        <div class="flex items-center border-2 border-gray-200 rounded-full overflow-hidden bg-white focus-within:border-mint-500 transition-colors">
          <input type="text" name="q" placeholder="Search medications, vitamins, health products..." class="flex-1 px-5 py-3 text-sm outline-none bg-transparent">
          <button type="submit" class="px-5 py-3 text-mint-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
        </div>
      </form>
    </div>
  </section>

  <section class="section-padding"><div class="container-max"><h2 class="text-2xl font-bold text-gray-900 mb-8 text-center">Shop by Category</h2><div id="categories" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6"></div></div></section>
  <section class="section-padding"><div class="container-max"><h2 class="text-2xl font-bold text-gray-900 mb-8">Featured Products</h2><div id="products" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div></div></section>

  <div id="footer"></div>
  <script src="/js/transitions.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    document.getElementById('nav').innerHTML = Components.shopNav();
    document.getElementById('footer').innerHTML = Components.footer();

    async function load() {
      try {
        const [catData, prodData] = await Promise.all([API.getCategories(), API.getProducts('featured=1')]);
        document.getElementById('categories').innerHTML = (catData.categories||[]).map(c => `<a href="/shop/${c.slug}" class="group relative overflow-hidden rounded-xl min-h-[160px] md:min-h-[200px] bg-teal-600 flex items-end p-4 hover:scale-[1.02] transition-transform"><span class="text-sm md:text-base font-bold text-white">${Utils.escapeHtml(c.name)}</span></a>`).join('');
        document.getElementById('products').innerHTML = (prodData.products||[]).map(p => `
          <div class="bg-white rounded-xl border border-gray-100 overflow-hidden hover:shadow-md transition-shadow flex flex-col">
            <a href="/shop/product/${p.slug}" class="block"><div class="relative aspect-square bg-gray-100 flex items-center justify-center"><span class="text-xs text-gray-400">No image</span>${p.requiresPrescription?'<span class="absolute top-2 right-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">Rx</span>':''}</div></a>
            <div class="p-3 md:p-4 flex flex-col flex-1">
              <a href="/shop/product/${p.slug}"><h3 class="text-sm font-semibold text-gray-900 mb-0.5 line-clamp-2">${Utils.escapeHtml(p.nameGeneric)}</h3>${p.nameBrand?`<p class="text-xs text-gray-500 mb-2">${Utils.escapeHtml(p.nameBrand)}</p>`:''}</a>
              <p class="text-base font-bold text-gray-900 mt-auto mb-3">${Utils.formatPrice(p.price)}</p>
              <button onclick="Cart.add({productId:'${p.id}',nameGeneric:'${p.nameGeneric.replace(/'/g,"\\'")}',nameBrand:${p.nameBrand?`'${p.nameBrand.replace(/'/g,"\\'")}'`:'null'},price:${p.price},requiresPrescription:${p.requiresPrescription},slug:'${p.slug}'});this.textContent='Added!';setTimeout(()=>this.textContent='Add to Cart',1500)" class="btn-primary text-xs w-full py-2">Add to Cart</button>
            </div>
          </div>`).join('');
      } catch (e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
